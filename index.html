<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getDatabase, ref, push } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
    
    /* TEMP Firebase Config */
    const firebaseConfig = {
        apiKey: "test",
        authDomain: "test.firebaseapp.com",
        databaseURL: "https://test-default-rtdb.firebaseio.com",
        projectId: "test",
        storageBucket: "test.appspot.com",
        messagingSenderId: "123456",
        appId: "123456"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let selectedPkg = '';
    let selectedPrice = 0;
    let selectedPay = 'bkash';
    let step = 1;

    const payNum = {
        bkash:'01873786543',
        nagad:'01873786543'
    };
    
    const packages = {
        'Special Offer': [
            { name: 'Weekly Special', price: 148 },
            { name: 'Monthly Special', price: 700 }
        ],

        'Free Fire - 200 Like': [
            { name: '200 Like - 1 Day', price: 15 },
            { name: '200 Like - 7 Day', price: 90 },
            { name: '200 Like - 30 Day', price: 350 }
        ],

        'UID Top Up': [
            { name: '25 Diamond', price: 24 },
            { name: '50 Diamond', price: 38 },
            { name: '115 Diamond', price: 79 },
            { name: '240 Diamond', price: 158 },
            { name: '355 Diamond', price: 238 },
            { name: '480 Diamond', price: 316 },
            { name: '610 Diamond', price: 405 },
            { name: '850 Diamond', price: 560 },
            { name: '1240 Diamond', price: 799 },
            { name: '2530 Diamond', price: 1595 },
            { name: '5060 Diamond', price: 3190 },
            { name: '10120 Diamond', price: 6350 }
        ],

        'Level Up Pass': [
            { name: 'Level 6', price: 40 },
            { name: 'Level 10', price: 70 },
            { name: 'Level 15', price: 70 },
            { name: 'Level 20', price: 70 },
            { name: 'Level 25', price: 70 },
            { name: 'Level 30', price: 100 },
            { name: 'Full Level Up', price: 400 }
        ],

        'Weekly Lite': [
            { name: '1X Weekly Lite', price: 44 },
            { name: '2X Weekly Lite', price: 88 },
            { name: '3X Weekly Lite', price: 130 },
            { name: '5X Weekly Lite', price: 210 }
        ],

        'Evo Access': [
            { name: '3 Days Evo Access', price: 65 },
            { name: '7 Days Evo Access', price: 99 },
            { name: '14 Days Evo Access', price: 200 },
            { name: '30 Days Evo Access', price: 299 }
        ],

        'Weekly Monthly': [
            { name: 'Weekly', price: 154 },
            { name: '2X Weekly', price: 308 },
            { name: '3X Weekly', price: 460 },
            { name: 'Monthly', price: 765 },
            { name: '2X Monthly', price: 1530 },
            { name: '1W + 1M', price: 915 },
            { name: '3W + 1M', price: 1220 }
        ],

        'Indonesia': [
            { name: 'ID 70 Diamond', price: 90 },
            { name: 'ID 140 Diamond', price: 180 }
        ]
    };

    window.openModal = (type) => {

        step = 1;

        document.getElementById('orderModal').style.display='flex';

        document.getElementById('modalTitle').innerText = type;

        let list = document.getElementById('pkgList');

        list.innerHTML = '';

        list.style.display = 'grid';

        document.getElementById('step2Box').style.display = 'none';

        document.getElementById('step1Box').style.display = 'block';

        packages[type].forEach(p => {

            let item = document.createElement('div');

            item.className='pkg-card';

            item.onclick = () => {

                document.querySelectorAll('.pkg-card').forEach(i => i.classList.remove('selected'));

                item.classList.add('selected');

                selectedPkg = p.name;

                selectedPrice = p.price;

                document.getElementById('needAmount').innerText = '৳ ' + p.price;
            };

            item.innerHTML = `<h4>${p.name}</h4><p>BDT ${p.price}</p>`;

            list.appendChild(item);
        });
    }

    window.closeModal = () => {

        document.getElementById('orderModal').style.display='none';

        selectedPkg='';

        selectedPrice=0;

        step=1;

        document.getElementById('needAmount').innerText='৳ 0';

        document.getElementById('uid').value='';

        document.getElementById('trxid').value='';
    }

    window.nextStep = () => {

        const uid = document.getElementById('uid').value.trim();

        if(!selectedPkg){
            alert('❌ প্যাকেজ সিলেক্ট করো');
            return;
        }

        if(!uid){
            alert('❌ Free Fire UID দাও');
            return;
        }

        step = 2;

        document.getElementById('step1Box').style.display = 'none';

        document.getElementById('step2Box').style.display = 'block';

        document.getElementById('payNumber').innerText = payNum[selectedPay];

        document.getElementById('payType').innerText =
            selectedPay==='bkash'
            ? 'bKash Personal - Send Money'
            : 'Nagad Personal - Send Money';
    }

    window.selectPay = (m) => {

        selectedPay = m;

        document.querySelectorAll('.pay-logo').forEach(t =>
            t.classList.remove('selected')
        );

        document.querySelector('.pay-logo.'+m).classList.add('selected');

        document.getElementById('payNumber').innerText = payNum[m];

        document.getElementById('payType').innerText =
            m==='bkash'
            ? 'bKash Personal - Send Money'
            : 'Nagad Personal - Send Money';

        document.getElementById('trxLabel').innerText =
            m==='bkash'
            ? 'bKash Transaction ID *'
            : 'Nagad Transaction ID *';
    }

    window.submitOrder = () => {

        const uid = document.getElementById('uid').value.trim();

        const trxid = document.getElementById('trxid').value.trim().toUpperCase();

        if(!uid){
            alert('❌ Free Fire UID দাও');
            return;
        }

        if(!trxid){
            alert('❌ Transaction ID দাও');
            return;
        }

        push(ref(db, 'orders/'), {

            pkg: selectedPkg,

            price: selectedPrice,

            uid: uid,

            trxid: trxid,

            payment: selectedPay,

            status: 'Pending',

            time: Date.now()

        }).then(() => {

            alert(
                '✅ অর্ডার সাবমিট!\n\n' +
                selectedPkg +
                ' - ৳' +
                selectedPrice +
                '\nUID: ' +
                uid +
                '\n\nআমরা 1-5 মিনিটে ডায়মন্ড পাঠিয়ে দিবো।'
            );

            closeModal();

        }).catch((err) => {

            alert('❌ Error: ' + err);

        });
    }

    window.checkOrder = () => {

        let trx = prompt('TrxID দাও:');

        if(!trx) return;

        alert('My Orders পেজে চেক করো অথবা WhatsApp এ নক দাও');
    }

    /* FIXED ADMIN PAGE */
    window.showAdmin = () => {

        window.location.href = './admin.html';

    }

</script>
