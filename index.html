<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FF BAZAR</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Hind Siliguri',sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:100px;
}

.header{
background:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:28px;
font-weight:800;
}

.logo span{
color:#6d28d9;
}

.profile{
width:40px;
height:40px;
border-radius:50%;
background:#059669;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-weight:700;
}

.container{
padding:15px;
max-width:600px;
margin:auto;
}

.notice{
background:#5b21b6;
padding:15px;
border-radius:15px;
color:#fff;
margin-bottom:15px;
position:relative;
}

.notice button{
position:absolute;
top:10px;
right:10px;
background:none;
border:none;
color:#fff;
font-size:25px;
cursor:pointer;
}

.banner{
margin-bottom:15px;
border-radius:15px;
overflow:hidden;
}

.banner img{
width:100%;
display:block;
}

.section-title{
text-align:center;
font-size:24px;
font-weight:800;
margin:25px 0 15px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.card{
background:#fff;
border-radius:18px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:170px;
object-fit:cover;
display:block;
}

.card p{
padding:12px;
font-weight:700;
text-align:center;
}

.help-btn{
position:fixed;
right:20px;
bottom:100px;
background:#dc2626;
color:#fff;
padding:12px 20px;
border:none;
border-radius:40px;
font-weight:700;
z-index:99;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-around;
padding:10px 0;
border-top:1px solid #ddd;
}

.nav-item{
text-align:center;
font-size:12px;
font-weight:700;
color:#555;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
z-index:999;
align-items:center;
justify-content:center;
padding:15px;
}

.modal-box{
background:#fff;
width:100%;
max-width:400px;
border-radius:20px;
padding:20px;
animation:pop .3s;
}

@keyframes pop{
from{
transform:scale(.8);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.close{
float:right;
font-size:30px;
cursor:pointer;
}

.modal-title{
font-size:24px;
font-weight:800;
margin-bottom:15px;
}

.package{
border:2px solid #ddd;
padding:15px;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
transition:.3s;
}

.package:hover{
border-color:#6d28d9;
background:#f3e8ff;
}

.buy-btn{
width:100%;
padding:15px;
background:#6d28d9;
border:none;
border-radius:12px;
color:#fff;
font-size:17px;
font-weight:700;
margin-top:15px;
cursor:pointer;
}

@media(max-width:480px){

.card img{
height:140px;
}

}

</style>
</head>

<body>

<div class="header">
<div class="logo">💎 FF <span>BAZAR</span></div>
<div class="profile">U</div>
</div>

<div class="container">

<div class="notice">
<button onclick="this.parentElement.style.display='none'">×</button>

<h3>Notice</h3>

<p>
১৮ বছরের নিচে কেউ অর্ডার করবেন না।
</p>

</div>

<div class="banner">
<img src="https://i.ibb.co/7QpKsCX/freefire.jpg">
</div>

<h2 class="section-title">FREE FIRE</h2>

<div class="grid">

<div class="card" onclick="openModal('UID TOPUP')">
<img src="https://i.ibb.co/z6Jzv6J/topup.jpg">
<p>UID TOPUP</p>
</div>

<div class="card" onclick="openModal('LEVEL UP PASS')">
<img src="https://i.ibb.co/F4J2L0M/level.jpg">
<p>LEVEL UP PASS</p>
</div>

<div class="card" onclick="openModal('WEEKLY')">
<img src="https://i.ibb.co/3h6xW4t/weekly.jpg">
<p>WEEKLY</p>
</div>

<div class="card" onclick="openModal('EVO ACCESS')">
<img src="https://i.ibb.co/BzL4D2s/evo.jpg">
<p>EVO ACCESS</p>
</div>

<div class="card" onclick="openModal('MONTHLY')">
<img src="https://i.ibb.co/F5xZL0v/monthly.jpg">
<p>MONTHLY</p>
</div>

<div class="card" onclick="openModal('LIKE BOT')">
<img src="https://i.ibb.co/Qd3Y0V0/like.jpg">
<p>LIKE BOT</p>
</div>

</div>

</div>

<button class="help-btn"
onclick="window.open('https://wa.me/8801873786543','_blank')">
সাহায্য লাগবে?
</button>

<div class="bottom-nav">

<div class="nav-item">
🏠
<br>
HOME
</div>

<div class="nav-item">
🛒
<br>
ORDER
</div>

<div class="nav-item">
👤
<br>
PROFILE
</div>

</div>

<div class="modal" id="modal">

<div class="modal-box">

<span class="close" onclick="closeModal()">&times;</span>

<h2 class="modal-title" id="modalTitle"></h2>

<div class="package">
🔥 100 Diamond - 85৳
</div>

<div class="package">
🔥 310 Diamond - 250৳
</div>

<div class="package">
🔥 520 Diamond - 420৳
</div>

<div class="package">
🔥 1060 Diamond - 820৳
</div>

<button class="buy-btn"
onclick="window.open('https://wa.me/8801873786543','_blank')">
ORDER NOW
</button>

</div>

</div>

<script>

function openModal(title){

document.getElementById("modal").style.display="flex";

document.getElementById("modalTitle").innerText=title;

}

function closeModal(){

document.getElementById("modal").style.display="none";

}

window.onclick=function(e){

if(e.target==document.getElementById("modal")){

closeModal();

}

}

</script>

</body>
</html>￼Enter
